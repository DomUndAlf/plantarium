
services:
  frontend:
    build: FE
    container_name: frontend
    ports:
      - "127.0.10.14:8080:3000"
    depends_on:
      - gateway
  gateway:
    image: nginx:alpine
    container_name: gateway
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "127.0.10.14:8082:80"
    depends_on:
      - auth
      - beds
      - plants
      - struct

  auth:
    build: ./aServices/auth
    container_name: auth
    env_file:
      - ./aServices/auth/.env
    expose:
      - "3000"
    depends_on:
      - mysql

  beds:
    build: ./aServices/beds
    container_name: beds
    env_file:
      - ./aServices/beds/.env
    expose:
      - "3000"
    depends_on:
      - mysql

  plants:
    build: ./aServices/plants
    container_name: plants
    env_file:
      - ./aServices/plants/.env
    expose:
      - "3000"
    depends_on:
      - mysql

  struct:
    build: ./aServices/struct
    container_name: struct
    env_file:
      - ./aServices/struct/.env
    expose:
      - "3000"
    depends_on:
      - mysql

  weather:
    build: ./aServices/weather
    container_name: weather
    env_file:
      - ./aServices/weather/.env
    ports:
      - "127.0.10.14:8081:3000"
    depends_on:
      - mysql
  mysql:
    image: mysql:8.0
    container_name: plantDB
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: plantarium
      MYSQL_DATABASE: plantarium
    ports:
      - "3307:3306"
    volumes:
      - plantarium-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      retries: 3
      start_period: 5s
      timeout: 10s

volumes:
  plantarium-data:
