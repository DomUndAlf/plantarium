version: '3.9'

services:
  frontend:
    build: FE
    ports:
    - "3000:3000"
    depends_on:
    - backend
  backend:
    build: BE
    ports: 
    - "3001:3001"
    depends_on:
    - mysql
  mysql:
    image: mysql:8.0
    container_name: plantDB
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: plantarium
      MYSQL_DATABASE: plantarium
      MYSQL_USER: dom
      MYSQL_PASSWORD: plantarium
    ports:
      - "3307:3306"
    volumes:
      - plantarium-data:/var/lib/mysql

volumes:
  plantarium-data:
